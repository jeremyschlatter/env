[global]
# My pip version sometimes falls behind the latest available, and that's ok.
# I'll pick up new releases each time I upgrade my nixpkgs snapshot.
disable-pip-version-check = True

[install]
# Only install packages whose latest release is at least 7 days old, to dodge
# freshly-published malicious versions. Needs pip >= 26.1; older pip silently
# ignores it, so this activates once my nixpkgs snapshot bumps pip past 26.1.
uploaded-prior-to = P7D
